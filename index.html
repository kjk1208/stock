<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미국 주식 대시보드</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">스컹 미국 주식 대시보드</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div class="container">
    <!-- 탭 네비게이션 -->
    <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button
          class="nav-link active"
          id="tab-dashboard"
          data-bs-toggle="tab"
          data-bs-target="#dashboard"
          type="button"
          role="tab"
          aria-controls="dashboard"
          aria-selected="true"
        >
          대시보드
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="tab-calendar"
          data-bs-toggle="tab"
          data-bs-target="#calendar"
          type="button"
          role="tab"
          aria-controls="calendar"
          aria-selected="false"
        >
          주식 일정
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="tab-relations"
          data-bs-toggle="tab"
          data-bs-target="#relations"
          type="button"
          role="tab"
          aria-controls="relations"
          aria-selected="false"
        >
          종목 관계
        </button>
      </li>
      <!-- 4번째 탭: 실시간 미국 주식 -->
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="tab-live"
          data-bs-toggle="tab"
          data-bs-target="#live"
          type="button"
          role="tab"
          aria-controls="live"
          aria-selected="false"
        >
          실시간 미국 주식
        </button>
      </li>
    </ul>

    <!-- 탭 컨텐츠 -->
    <div class="tab-content" id="dashboardTabsContent">
      <!-- 대시보드 탭 -->
      <div
        class="tab-pane fade show active"
        id="dashboard"
        role="tabpanel"
        aria-labelledby="tab-dashboard"
      >
        <div class="row mt-4">
          <!-- 요약 카드들 -->
          <div class="col-md-3">
            <div class="card text-white bg-primary">
              <div class="card-body">
                <h5 class="card-title">전체 투자금</h5>
                <p class="card-text">$50,000</p>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-success">
              <div class="card-body">
                <h5 class="card-title">현재 자산 가치</h5>
                <p class="card-text">$55,000</p>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-warning">
              <div class="card-body">
                <h5 class="card-title">총 수익률</h5>
                <p class="card-text">+10%</p>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-danger">
              <div class="card-body">
                <h5 class="card-title">일일 변화율</h5>
                <p class="card-text">-0.5%</p>
              </div>
            </div>
          </div>
        </div>

        <!-- 차트 영역 -->
        <div class="row mt-4">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">포트폴리오 가치 추이</h5>
                <canvas id="portfolioChart" width="400" height="150"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- 보유 주식 목록 -->
        <div class="row mt-4">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">보유 주식 목록</h5>
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>종목명</th>
                      <th>보유 수량</th>
                      <th>매수가</th>
                      <th>현재가</th>
                      <th>수익률</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>Apple (AAPL)</td>
                      <td>10</td>
                      <td>$150</td>
                      <td>$160</td>
                      <td>+6.67%</td>
                    </tr>
                    <tr>
                      <td>Amazon (AMZN)</td>
                      <td>5</td>
                      <td>$3,000</td>
                      <td>$3,100</td>
                      <td>+3.33%</td>
                    </tr>
                    <!-- 추가 행들 삽입 가능 -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 주식 일정 탭 -->
      <div
        class="tab-pane fade"
        id="calendar"
        role="tabpanel"
        aria-labelledby="tab-calendar"
      >
        <div class="row mt-4">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">주식 관련 일정</h5>
                <div id="calendarContainer">
                  <p>여기에 주식 관련 일정 달력이 표시됩니다.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 종목 관계 탭 -->
      <div
        class="tab-pane fade"
        id="relations"
        role="tabpanel"
        aria-labelledby="tab-relations"
      >
        <div class="row mt-4">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">종목 간 관계 시각화</h5>
                <div id="relationsGraph" style="height: 400px;">
                  <p>여기에 종목 간 관계를 나타내는 그래프가 표시됩니다.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 실시간 미국 주식 탭 -->
      <div
        class="tab-pane fade"
        id="live"
        role="tabpanel"
        aria-labelledby="tab-live"
      >
        <div class="row mt-4">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">실시간 미국 주식</h5>
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>종목명</th>
                      <th>현재가</th>
                      <th>전일 종가</th>
                      <th>변화율</th>
                    </tr>
                  </thead>
                  <tbody id="liveStockTableBody">
                    <!-- 실시간 데이터가 여기에 표시됩니다 -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <!-- Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- FullCalendar JS (글로벌 빌드 사용) -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <!-- Custom JS -->
  <script src="js/script.js"></script>
</body>
</html>
